name: Update Secrets

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to update'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  update_secrets:
    name: Update secrets on ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - name: Set deployment variables
        id: vars
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "work_dir=/opt/derecksnotes/prod" >> $GITHUB_OUTPUT
            echo "container_name=prod_derecksnotes" >> $GITHUB_OUTPUT
            echo "port_client=3000" >> $GITHUB_OUTPUT
            echo "port_server=3001" >> $GITHUB_OUTPUT
            echo "data_path=/var/www/derecksnotes.com/data" >> $GITHUB_OUTPUT
            echo "public_path=/var/www/derecksnotes.com/public" >> $GITHUB_OUTPUT
            echo "image=ghcr.io/dereckmezquita/derecksnotes:prod" >> $GITHUB_OUTPUT
          else
            echo "work_dir=/opt/derecksnotes/dev" >> $GITHUB_OUTPUT
            echo "container_name=dev_derecksnotes" >> $GITHUB_OUTPUT
            echo "port_client=3010" >> $GITHUB_OUTPUT
            echo "port_server=3011" >> $GITHUB_OUTPUT
            echo "data_path=/var/www/dev.derecksnotes.com/data" >> $GITHUB_OUTPUT
            echo "public_path=/var/www/dev.derecksnotes.com/public" >> $GITHUB_OUTPUT
            echo "image=ghcr.io/dereckmezquita/derecksnotes:dev" >> $GITHUB_OUTPUT
          fi

      - name: Update secrets and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USERNAME }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: ${{ secrets.REMOTE_PORT }}
          command_timeout: 5m
          script: |
            cd ${{ steps.vars.outputs.work_dir }}

            printf '%s\n' \
              "IMAGE_NAME=${{ steps.vars.outputs.image }}" \
              "CONTAINER_NAME=${{ steps.vars.outputs.container_name }}" \
              "PORT_CLIENT=${{ steps.vars.outputs.port_client }}" \
              "PORT_SERVER=${{ steps.vars.outputs.port_server }}" \
              "BUILD_ENV=${{ inputs.environment }}" \
              "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" \
              "ADMIN_USERNAME=${{ secrets.ADMIN_USERNAME }}" \
              "DATA_PATH=${{ steps.vars.outputs.data_path }}" \
              "PUBLIC_PATH=${{ steps.vars.outputs.public_path }}" \
              > .env

            chmod 600 .env

            docker compose down
            docker compose up -d

            echo "Waiting for health check..."
            sleep 10
            curl -sf http://localhost:${{ steps.vars.outputs.port_server }}/api/health || echo "Warning: health check failed"

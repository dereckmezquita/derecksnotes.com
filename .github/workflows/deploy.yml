name: Deploy to Linode

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod
  release:
    types: [published]

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/dereckmezquita/derecksnotes

jobs:
  build_and_push:
    name: Build image
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.vars.outputs.environment }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "image_tag=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
            echo "image_tag=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.image_tag }}
          build-args: |
            BUILD_ENV=${{ steps.vars.outputs.environment }}
            COMMIT_SHA=${{ github.sha }}

  deploy:
    name: Deploy to ${{ needs.build_and_push.outputs.environment }}
    needs: build_and_push
    runs-on: ubuntu-latest
    env:
      ENV: ${{ needs.build_and_push.outputs.environment }}
      TAG: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - name: Set deployment variables
        id: vars
        run: |
          if [ "${{ env.ENV }}" = "prod" ]; then
            echo "container_name=prod_derecksnotes" >> $GITHUB_OUTPUT
            echo "port_client=3000" >> $GITHUB_OUTPUT
            echo "port_server=3001" >> $GITHUB_OUTPUT
            echo "data_path=/var/www/derecksnotes.com/data" >> $GITHUB_OUTPUT
            echo "public_path=/var/www/derecksnotes.com/public" >> $GITHUB_OUTPUT
          else
            echo "container_name=dev_derecksnotes" >> $GITHUB_OUTPUT
            echo "port_client=3010" >> $GITHUB_OUTPUT
            echo "port_server=3011" >> $GITHUB_OUTPUT
            echo "data_path=/var/www/dev.derecksnotes.com/data" >> $GITHUB_OUTPUT
            echo "public_path=/var/www/dev.derecksnotes.com/public" >> $GITHUB_OUTPUT
          fi

      - name: Checkout docker-compose.yml
        uses: actions/checkout@v4
        with:
          sparse-checkout: docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USERNAME }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: ${{ secrets.REMOTE_PORT }}
          source: docker-compose.yml
          target: /opt/derecksnotes/${{ env.ENV }}/

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USERNAME }}
          password: ${{ secrets.REMOTE_PASSWORD }}
          port: ${{ secrets.REMOTE_PORT }}
          envs: GH_TOKEN
          command_timeout: 10m
          script: |
            set -e

            WORK_DIR="/opt/derecksnotes/${{ env.ENV }}"
            IMAGE="${{ env.IMAGE_NAME }}:${{ env.TAG }}"

            echo "=== Deploying ${{ env.ENV }} ==="
            echo "Image: ${IMAGE}"

            cd "$WORK_DIR"

            # ---- Write .env ----

            printf '%s\n' \
              "IMAGE_NAME=${IMAGE}" \
              "CONTAINER_NAME=${{ steps.vars.outputs.container_name }}" \
              "PORT_CLIENT=${{ steps.vars.outputs.port_client }}" \
              "PORT_SERVER=${{ steps.vars.outputs.port_server }}" \
              "BUILD_ENV=${{ env.ENV }}" \
              "COMMIT_SHA=${{ github.sha }}" \
              "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" \
              "DATA_PATH=${{ steps.vars.outputs.data_path }}" \
              "PUBLIC_PATH=${{ steps.vars.outputs.public_path }}" \
              > .env

            chmod 600 .env

            # ---- Ensure directories exist ----

            mkdir -p "${{ steps.vars.outputs.data_path }}"
            mkdir -p "${{ steps.vars.outputs.public_path }}"

            # ---- Login to ghcr.io and pull ----

            echo "$GH_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            docker pull "$IMAGE"

            # ---- Start containers ----

            docker compose down || true
            docker compose up -d

            # ---- Health check ----

            echo "Waiting for startup..."
            sleep 15

            if curl -sf http://localhost:${{ steps.vars.outputs.port_server }}/api/health; then
              echo ""
              echo "=== Deploy successful ==="
            else
              echo ""
              echo "Warning: Health check failed. Check logs with:"
              echo "  cd ${WORK_DIR} && docker compose logs"
            fi

            # ---- Cleanup ----

            docker image prune -f 2>/dev/null || true
